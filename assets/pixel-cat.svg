<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Interactive pixel art">
  <defs>
    <style>
      /* Base pixel styling */
      .px {
        transition: fill 0.25s ease, transform 0.25s ease;
        transform-box: fill-box;
        transform-origin: center;
      }
      /* Interactive hover — works on GitHub when SVG is opened directly */
      .px:hover {
        fill: #f7768e !important;
        transform: scale(1.3);
      }

      /* Idle animations for the face */
      .eye {
        animation: blink 4s infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes blink {
        0%, 92%, 100% { transform: scaleY(1); }
        95%           { transform: scaleY(0.1); }
      }

      .glow-bg {
        animation: pulse 6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.15; }
        50%      { opacity: 0.45; }
      }

      /* Sparkles */
      .spark {
        transform-box: fill-box;
        transform-origin: center;
        animation: sparkle 2.5s ease-in-out infinite;
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
        50%      { opacity: 1; transform: scale(1)   rotate(180deg); }
      }

      /* Floating motion on the whole cat */
      .cat {
        animation: float 3s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-6px); }
      }
    </style>

    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#1a1b26"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="320" fill="#1a1b26"/>
  <rect class="glow-bg" width="320" height="320" fill="url(#bg)"/>

  <!-- Sparkles (decorative) -->
  <g fill="#e0af68">
    <rect class="spark" x="30"  y="40"  width="8" height="8" style="animation-delay: 0s"/>
    <rect class="spark" x="280" y="60"  width="8" height="8" style="animation-delay: 0.6s"/>
    <rect class="spark" x="40"  y="260" width="8" height="8" style="animation-delay: 1.2s"/>
    <rect class="spark" x="270" y="250" width="8" height="8" style="animation-delay: 1.8s"/>
  </g>

  <!-- Pixel cat — each <rect> is 16x16 grid cell, hoverable -->
  <!-- Hover any pixel to see it bounce & turn pink -->
  <g class="cat">
    <!-- Ears -->
    <rect class="px" x="96"  y="96"  width="16" height="16" fill="#7aa2f7"/>
    <rect class="px" x="112" y="96"  width="16" height="16" fill="#7aa2f7"/>
    <rect class="px" x="192" y="96"  width="16" height="16" fill="#7aa2f7"/>
    <rect class="px" x="208" y="96"  width="16" height="16" fill="#7aa2f7"/>

    <!-- Head top row -->
    <rect class="px" x="96"  y="112" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="112" y="112" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="128" y="112" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="144" y="112" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="160" y="112" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="176" y="112" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="192" y="112" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="208" y="112" width="16" height="16" fill="#9ece6a"/>

    <!-- Head middle -->
    <rect class="px" x="96"  y="128" width="16" height="16" fill="#9ece6a"/>
    <rect class="px eye" x="112" y="128" width="16" height="16" fill="#1a1b26"/>
    <rect class="px" x="128" y="128" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="144" y="128" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="160" y="128" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="176" y="128" width="16" height="16" fill="#9ece6a"/>
    <rect class="px eye" x="192" y="128" width="16" height="16" fill="#1a1b26"/>
    <rect class="px" x="208" y="128" width="16" height="16" fill="#9ece6a"/>

    <!-- Nose / mouth row -->
    <rect class="px" x="96"  y="144" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="112" y="144" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="128" y="144" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="144" y="144" width="16" height="16" fill="#f7768e"/>
    <rect class="px" x="160" y="144" width="16" height="16" fill="#f7768e"/>
    <rect class="px" x="176" y="144" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="192" y="144" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="208" y="144" width="16" height="16" fill="#9ece6a"/>

    <!-- Body -->
    <rect class="px" x="112" y="160" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="128" y="160" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="144" y="160" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="160" y="160" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="176" y="160" width="16" height="16" fill="#9ece6a"/>
    <rect class="px" x="192" y="160" width="16" height="16" fill="#9ece6a"/>

    <!-- Paws -->
    <rect class="px" x="112" y="176" width="16" height="16" fill="#7aa2f7"/>
    <rect class="px" x="192" y="176" width="16" height="16" fill="#7aa2f7"/>
  </g>

  <!-- Caption -->
  <text x="160" y="280" text-anchor="middle"
        font-family="SF Mono, Menlo, monospace" font-size="11" fill="#a9b1d6">
    hover the pixels ✦
  </text>
  <text x="160" y="298" text-anchor="middle"
        font-family="SF Mono, Menlo, monospace" font-size="9" fill="#565f89">
    (open this SVG directly to interact)
  </text>
</svg>
